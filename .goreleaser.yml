version: 2
project_name: shipyard

# NOTE: This builds the headless/CLI binary (CGO_ENABLED=0).
# Desktop .app/.exe builds require CGO and use `wails build` separately.
# See: make wails-build
builds:
  - main: ./cmd/shipyard
    binary: shipyard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^nightshift:"

release:
  github:
    owner: sloik
    name: shipyard
