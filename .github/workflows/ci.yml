name: CI

on:
  push:
    branches: [v2/main]
  pull_request:
    branches: [v2/main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./cmd/shipyard/
