name: Desktop Build

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop app
        working-directory: cmd/shipyard
        run: wails build -skipbindings -ldflags "-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}"

      - name: Show binary size
        run: |
          ls -lh cmd/shipyard/build/bin/shipyard.app/Contents/MacOS/shipyard
          du -sh cmd/shipyard/build/bin/shipyard.app

      - name: Create zip
        run: |
          cd cmd/shipyard/build/bin
          zip -r shipyard-macos.zip shipyard.app

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: shipyard-macos-${{ github.sha }}
          path: cmd/shipyard/build/bin/shipyard-macos.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/shipyard/build/bin/shipyard-macos.zip
